site_name: avro-datagen
site_description: Schema-driven fake data generator for Avro schemas with arg.properties hints
site_url: https://consciousexplorer.github.io/avro-datagen/
docs_dir: docs-site
repo_url: https://github.com/ConsciousExplorer/avro-datagen
repo_name: avro-datagen

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 3
            docstring_style: google
            merge_init_into_class: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Schema Guide:
      - Writing Schemas: schemas/writing-schemas.md
      - arg.properties Reference: schemas/arg-properties.md
      - Faker Integration: schemas/faker.md
      - Examples: schemas/examples.md
  - Deployment:
      - Pipe to Kafka: deployment/kafka-pipe.md
      - Kafka Producer App: deployment/kafka-producer-app.md
      - Streamlit UI: deployment/streamlit-ui.md
  - How It Works: how-it-works.md
  - API Reference: api.md
  - Design: design.md
