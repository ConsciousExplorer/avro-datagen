name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Format
        run: uv run ruff format --check src/ tests/

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest -v --cov=avro_datagen --cov-report=term-missing --cov-branch
